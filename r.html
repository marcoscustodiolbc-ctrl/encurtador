<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 2rem; }
    .logo { font-size: 1.4rem; font-weight: 500; color: #0d7c66; }
    .ring {
      width: 52px; height: 52px;
      border: 3px solid rgba(13,124,102,0.2);
      border-top-color: #0d7c66;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: 0.95rem; }
    #dest { color: #0d7c66; font-size: 0.82rem; word-break: break-all; max-width: 320px; }
    .btn {
      margin-top: 8px; padding: 12px 28px;
      background: #0d7c66; color: #fff;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wrap" id="loading">
    <div class="logo">🔗 Encurtador</div>
    <div class="ring"></div>
    <p>Redirecionando...</p>
    <span id="dest"></span>
  </div>

  <div class="wrap" id="erro" style="display:none">
    <div class="logo">🔗 Encurtador</div>
    <p style="color:#ff6b6b; font-size:1.1rem; font-weight:600;">Link não encontrado</p>
    <p>Este link não existe ou foi removido.</p>
    <a href="/encurtador/" class="btn">Criar um link</a>
  </div>

  <script>
    // Pega as credenciais diretamente (sem depender do config.js)
    const SUPA_URL = "https://ihtrqotxtjafsoeybxij.supabase.co";
    const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodHJxb3R4dGphZnNvZXlieGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjEyMDcsImV4cCI6MjA5NTkzNzIwN30.P2GZEydqQhZ1J9LsmrmlIEDl0AuCHh4bIuTG8ixOmlo";

    async function redirect() {
      // Pega o slug da URL: r.html?s=HB7MiY
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('s');

      if (!slug) {
        window.location.href = '/encurtador/';
        return;
      }

      try {
        const res = await fetch(
          `${SUPA_URL}/rest/v1/links?slug=eq.${slug}&select=original_url,id`,
          {
            headers: {
              apikey: SUPA_KEY,
              Authorization: `Bearer ${SUPA_KEY}`
            }
          }
        );

        const data = await res.json();

        if (!data || data.length === 0) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('erro').style.display = 'flex';
          return;
        }

        const { original_url, id } = data[0];

        // Mostra destino
        document.getElementById('dest').textContent = original_url;

        // Incrementa cliques (sem aguardar)
        fetch(`${SUPA_URL}/rest/v1/rpc/increment_clicks`, {
          method: 'POST',
          headers: {
            apikey: SUPA_KEY,
            Authorization: `Bearer ${SUPA_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ link_id: id })
        }).catch(() => {});

        // Redireciona após 700ms
        setTimeout(() => { window.location.href = original_url; }, 700);

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('erro').style.display = 'flex';
      }
    }

    redirect();
  </script>
</body>
</html>
