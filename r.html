<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando... — encurta.link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #c8ff00;
    }

    .ring {
      width: 56px;
      height: 56px;
      border: 3px solid rgba(200,255,0,0.15);
      border-top-color: #c8ff00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    p {
      font-size: 1rem;
      font-weight: 300;
      color: #888;
      max-width: 300px;
      line-height: 1.6;
    }

    #destination {
      color: #c8ff00;
      font-size: 0.85rem;
      word-break: break-all;
      max-width: 360px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #destination.visible { opacity: 1; }

    .not-found {
      flex-direction: column;
      gap: 16px;
    }

    .not-found h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #c8ff00;
    }

    .back-btn {
      margin-top: 8px;
      padding: 12px 28px;
      background: #c8ff00;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="loader-wrap" id="loadingState">
    <div class="logo">⚡ encurta.link</div>
    <div class="ring"></div>
    <p>Buscando destino...</p>
    <span id="destination"></span>
  </div>

  <div class="loader-wrap" id="errorState" style="display:none">
    <div class="logo">⚡ encurta.link</div>
    <h2 style="color:#ff6b6b; font-size:1.3rem;">Link não encontrado</h2>
    <p>Este link não existe ou foi removido.</p>
    <a href="/" class="back-btn">Criar um link</a>
  </div>

  <script src="config.js"></script>
  <script>
    async function redirect() {
      const slug = window.location.pathname.replace('/', '').trim();

      if (!slug) {
        window.location.href = '/';
        return;
      }

      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/links?slug=eq.${slug}&select=original_url,id`,
          {
            headers: {
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );

        const data = await res.json();

        if (!data || data.length === 0) {
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('errorState').style.display = 'flex';
          return;
        }

        const { original_url, id } = data[0];

        // Show destination
        const dest = document.getElementById('destination');
        dest.textContent = original_url;
        dest.classList.add('visible');

        // Increment click count (fire and forget)
        fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_clicks`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ link_id: id })
        }).catch(() => {});

        // Redirect after short delay
        setTimeout(() => {
          window.location.href = original_url;
        }, 800);

      } catch (err) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'flex';
      }
    }

    redirect();
  </script>
</body>
</html>
